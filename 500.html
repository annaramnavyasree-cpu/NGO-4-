{% extends "base.html" %}

{% block title %}Server Error - Hope Foundation{% endblock %}

{% block extra_css %}
<style>
    .error-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
        padding: 2rem 0;
    }
    
    .error-card {
        text-align: center;
        max-width: 500px;
    }
    
    .error-code {
        font-size: 8rem;
        font-weight: bold;
        color: #dc3545;
        line-height: 1;
        margin-bottom: 1rem;
    }
    
    .error-title {
        font-size: 1.5rem;
        color: #333;
        margin-bottom: 1rem;
    }
    
    .error-message {
        color: #6c757d;
        margin-bottom: 2rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-card">
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">
            Something went wrong on our end. Please try again later or contact support if the problem persists.
        </p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>Go to Homepage
        </a>
    </div>
</div>
{% endblock %}
